<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>
<body class="login-page">
    <main class="login-box shadow-sm">
        <h1 class="h4 mb-4">Laboratuvar Takip Sistemi</h1>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Kullanıcı adı / Öğrenci no</label>
                <input id="username" class="form-control" type="text" placeholder="Admin: admin / Öğrenci: öğrenci no" required>
                <div class="form-text">Öğrenciysen öğrenci numaranı bu alana yaz.</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Şifre</label>
                <input id="password" class="form-control" type="password" placeholder="Öğrenci şifresi öğrenci numarasıdır" required>
                <div class="form-text">Öğrenciler için kullanıcı adı ve şifre aynı öğrenci numarasıdır.</div>
            </div>

            <button class="btn btn-primary w-100" type="submit">
                <i class="fa-solid fa-right-to-bracket me-1"></i> Giriş Yap
            </button>
            <p id="loginMessage" class="text-danger small mt-3 mb-0"></p>
        </form>
        <div class="small text-secondary mt-3">
            Admin: admin / 123<br>
            Öğrenci girişi: kullanıcı adı öğrenci no, şifre öğrenci no.
        </div>
    </main>
</body>
</html>
