<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>
<body data-role="Student">
    <div class="app">
        <aside class="sidebar">
            <h1>Lab Takip</h1>
            <a href="#summary"><i class="fa-solid fa-id-card me-2"></i>Özet</a>
            <a href="#myPc"><i class="fa-solid fa-computer me-2"></i>Bilgisayarlarım</a>
            <button id="logoutBtn" class="btn btn-danger"><i class="fa-solid fa-right-from-bracket me-1"></i> Çıkış</button>
        </aside>

        <main>
            <section id="summary" class="student-hero">
                <div>
                    <p class="eyebrow">Öğrenci Paneli</p>
                    <h2 id="studentNameTitle">Zimmet Bilgilerim</h2>
                    <div id="studentInfo" class="student-meta"></div>
                </div>
                <div class="student-stat">
                    <span id="studentComputerCount">0</span>
                    <small>Zimmetli bilgisayar</small>
                </div>
            </section>

            <section id="myPc" class="panel">
                <div class="section-title-row">
                    <div>
                        <p class="eyebrow">Cihaz Listesi</p>
                        <h2>Zimmetli Bilgisayarlarım</h2>
                    </div>
                    <span class="status-pill"><i class="fa-solid fa-circle-check me-1"></i>Güncel</span>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped align-middle">
                        <thead>
                            <tr>
                                <th>Kod</th>
                                <th>Laboratuvar</th>
                                <th>Marka</th>
                                <th>İşlemci</th>
                                <th>RAM</th>
                                <th>HDMI</th>
                                <th>Veyon</th>
                            </tr>
                        </thead>
                        <tbody id="studentTable"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
